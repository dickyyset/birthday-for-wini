<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

.container {
  padding: 40px 20px;
}

h1 {
  font-size: 3em;
}

.hidden {
  display: none;
}

button {
  padding: 15px 25px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ffe0e6;
}

img {
  width: 250px;
  border-radius: 20px;
  margin-top: 20px;
}

.fade {
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(0);
    opacity: 1;
  }
  100% {
    transform: translateY(-800px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>Happy Birthday ❤️</h1>
  <p>Untuk kamu yang paling spesial di hidup aku</p>

  <button onclick="start()">Klik di sini 🎁</button>

  <div id="content" class="hidden fade">

    <h2 id="typing"></h2>

    <img src="foto.JPEG" alt="foto kalian">

    <p>
      Aku bersyukur banget bisa kenal kamu.  
      Semoga kamu selalu bahagia, sehat, dan semua impian kamu tercapai.  
      Aku bakal selalu ada buat kamu ❤️
    </p>

  </div>

</div>

<audio id="music" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>
function start() {
  document.getElementById("content").classList.remove("hidden");
  document.getElementById("music").play();
  typeText();
  createHearts();
}

let text = "Di hari spesial kamu ini...";
let i = 0;

function typeText() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 80);
  }
}

function createHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
